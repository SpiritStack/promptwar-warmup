steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/visuallink', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/visuallink']

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gcloud'
  args:
    - 'run'
    - 'deploy'
    - 'visuallink'
    - '--image'
    - 'gcr.io/$PROJECT_ID/visuallink'
    - '--region'
    - 'us-central1'
    - '--allow-unauthenticated'
    - '--set-env-vars'
    - 'GCP_PROJECT_ID=$PROJECT_ID,GCS_BUCKET_NAME=visuallink-media,APP_ENV=production'
    - '--set-secrets'
    - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'

images:
- 'gcr.io/$PROJECT_ID/visuallink'

options:
  logging: CLOUD_LOGGING_ONLY
